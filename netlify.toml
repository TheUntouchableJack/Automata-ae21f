# Netlify Configuration

[build]
  publish = "."

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.anthropic.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://nominatim.openstreetmap.org https://tile.openstreetmap.org https://fcm.googleapis.com https://fcmregistrations.googleapis.com; frame-src https://js.stripe.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'"

# Cache static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Force redirect Netlify subdomain to custom domain
[[redirects]]
  from = "https://automata-jay.netlify.app/*"
  to = "https://royaltyapp.ai/:splat"
  status = 301
  force = true

# Redirects for SPA-like behavior (optional)
[[redirects]]
  from = "/app/*"
  to = "/app/:splat"
  status = 200

# Customer app slug routing (/a/{slug} → customer-app)
[[redirects]]
  from = "/a/:slug/checkin"
  to = "/customer-app/app.html?slug=:slug&action=checkin"
  status = 200

[[redirects]]
  from = "/a/:slug/app"
  to = "/customer-app/app.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/a/:slug/social"
  to = "/customer-app/social.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/a/:slug"
  to = "/customer-app/index.html?slug=:slug"
  status = 200

# Blog post clean URLs (SEO-friendly paths instead of hash routing)
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/post.html"
  status = 200

# Public roadmap clean URL
[[redirects]]
  from = "/roadmap"
  to = "/roadmap.html"
  status = 200

# Clean URLs for legal/contact pages
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Custom error pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
