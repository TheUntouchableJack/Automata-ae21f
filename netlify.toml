# Netlify Configuration

[build]
  publish = "."

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; media-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.anthropic.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://nominatim.openstreetmap.org https://tile.openstreetmap.org; frame-src https://js.stripe.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'"

# Cache static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for SPA-like behavior (optional)
[[redirects]]
  from = "/app/*"
  to = "/app/:splat"
  status = 200

# Customer app slug routing (/a/{slug} → customer-app)
[[redirects]]
  from = "/a/:slug/app"
  to = "/customer-app/app.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/a/:slug/social"
  to = "/customer-app/social.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/a/:slug"
  to = "/customer-app/index.html?slug=:slug"
  status = 200

# Custom error pages
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
