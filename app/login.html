<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../i18n/i18n.css">
    <!-- Cloudflare Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg-secondary) !important;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            margin: 0 auto;
            position: relative;
        }

        .auth-card {
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-border);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .logo {
            display: inline-flex;
            margin-bottom: 24px;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 15px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-field input {
            padding: 12px 16px;
            font-family: inherit;
            font-size: 15px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            outline: none;
            transition: all var(--transition-base);
        }

        .form-field input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-field input::placeholder {
            color: var(--color-text-muted);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
        }

        .auth-footer p {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .auth-footer a {
            color: var(--color-primary);
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .back-link:hover {
            color: var(--color-text);
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success state */
        .btn-success {
            background: var(--color-success) !important;
            border-color: var(--color-success) !important;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            color: var(--color-success);
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 15px;
            text-align: center;
            display: none;
        }

        .success-message.visible {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .success-message h3 {
            font-size: 18px;
            margin-bottom: 4px;
            color: var(--color-success);
        }

        .success-message p {
            margin: 0;
            opacity: 0.9;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .lang-selector.compact {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Language Selector -->
        <div class="lang-selector compact">
            <button class="lang-selector-btn" type="button" aria-label="Change language">
                <span class="lang-selector-current">EN</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="lang-dropdown">
                <a href="#" class="lang-option active" data-lang="en">EN</a>
                <a href="#" class="lang-option" data-lang="es">ES</a>
                <a href="#" class="lang-option" data-lang="fr">FR</a>
                <a href="#" class="lang-option" data-lang="de">DE</a>
                <a href="#" class="lang-option" data-lang="it">IT</a>
                <a href="#" class="lang-option" data-lang="pt">PT</a>
                <a href="#" class="lang-option" data-lang="zh">ZH</a>
                <a href="#" class="lang-option" data-lang="ar">AR</a>
            </div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo">
                    <img src="/logo.svg" alt="Royalty" class="logo-icon">
                    <span class="logo-text">Royalty</span>
                </a>
                <h1 data-i18n="auth.welcomeBack">Welcome back</h1>
                <p data-i18n="auth.signInSubtitle">Sign in to your account to continue</p>
            </div>

            <div class="success-message" id="success-message">
                <h3>Welcome back!</h3>
                <p>Redirecting to your dashboard...</p>
            </div>

            <form class="auth-form" id="login-form">
                <div class="error-message" id="error-message"></div>

                <div class="form-field">
                    <label for="email" data-i18n="auth.email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" data-i18n-placeholder="auth.emailPlaceholder" required>
                </div>

                <div class="form-field">
                    <label for="password" data-i18n="auth.password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" data-i18n-placeholder="auth.passwordPlaceholder" required>
                </div>

                <!-- CAPTCHA Widget - Replace YOUR_SITE_KEY with your Cloudflare Turnstile site key -->
                <div class="cf-turnstile" data-sitekey="0x4AAAAAACWKZKBFwf0yeBCo" data-callback="onTurnstileSuccess" data-error-callback="onTurnstileError" data-theme="light"></div>
                <div class="captcha-error" id="captcha-error" style="display: none; color: var(--color-error); font-size: 13px; margin-bottom: 12px;" data-i18n="auth.captchaError">Please complete the CAPTCHA verification.</div>

                <button type="submit" class="btn btn-primary btn-block" id="submit-btn" data-i18n="auth.signIn">
                    Sign In
                </button>
            </form>

            <div style="text-align: right; margin-top: 8px;">
                <a href="/app/forgot-password.html" style="font-size: 13px; color: var(--color-text-muted);" data-i18n="auth.forgotPassword">Forgot password?</a>
            </div>

            <div class="auth-footer">
                <p><span data-i18n="auth.noAccount">Don't have an account?</span> <a href="/app/signup.html" data-i18n="auth.signUp">Sign up</a></p>
            </div>
        </div>

        <a href="/" class="back-link" data-i18n="auth.backToHome">Back to home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../i18n/i18n.js?v=1"></script>
    <script src="onboarding-storage.js?v=1"></script>
    <script src="auth.js?v=11"></script>
    <script src="mfa.js?v=2"></script>
    <script src="onboarding-transition.js?v=1"></script>
    <script src="celebrate.js?v=2"></script>
    <script>
        // CAPTCHA state
        let turnstileToken = null;
        function onTurnstileSuccess(token) {
            turnstileToken = token;
            document.getElementById('captcha-error').style.display = 'none';
        }
        function onTurnstileError() {
            // CAPTCHA failed to initialize (e.g., domain not authorized in Cloudflare dashboard)
            // Allow login to proceed — Supabase still validates credentials server-side
            turnstileToken = 'captcha-unavailable';
        }

        // Set up form handler FIRST (before any async operations)
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');

        // Clear form inputs on every page load
        loginForm.reset();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Clear previous errors
            errorMessage.classList.remove('visible');
            errorMessage.textContent = '';

            // Validate CAPTCHA (skip if site key not configured)
            const captchaWidget = document.querySelector('.cf-turnstile');
            const siteKey = captchaWidget?.getAttribute('data-sitekey');
            if (siteKey && siteKey !== 'YOUR_SITE_KEY' && !turnstileToken) {
                document.getElementById('captcha-error').style.display = 'block';
                return;
            }

            // Show loading state
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;

            try {
                const { user, error } = await signIn(email, password);

                if (error) {
                    throw error;
                }

                // MFA gate: if user has 2FA enrolled and device isn't trusted,
                // mfaGate() redirects to /app/mfa-challenge.html and returns false.
                if (typeof mfaGate === 'function') {
                    const passed = await mfaGate(user);
                    if (!passed) return;
                }

                // Check for pending onboarding data and save it
                const newProjectId = await saveOnboardingDataAfterLogin(user.id);

                // Success! Hide form and show celebration
                loginForm.style.display = 'none';
                successMessage.classList.add('visible');

                // Update button to success state
                submitBtn.classList.remove('btn-loading');
                submitBtn.classList.add('btn-success');
                submitBtn.textContent = 'Welcome Back!';

                // Fire confetti!
                celebrate();

                // Redirect after celebration - go to Intelligence (welcome banner + onboarding)
                setTimeout(() => {
                    window.location.href = '/app/intelligence.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);

                // Show error message
                let message = 'An error occurred. Please try again.';
                if (error.message) {
                    if (error.message.includes('Invalid login credentials')) {
                        message = 'Invalid email or password.';
                    } else if (error.message.includes('Email not confirmed')) {
                        message = 'Please verify your email before signing in.';
                    } else {
                        message = error.message;
                    }
                }

                errorMessage.textContent = message;
                errorMessage.classList.add('visible');

                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        });

        // Handle auth state - including email confirmation redirects
        async function handleAuthOnLoad() {
            // Check for PKCE code in query string (modern Supabase flow)
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');

            // Check for hash-based tokens (legacy flow)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const hasHashTokens = hashParams.has('access_token') || hashParams.has('refresh_token');

            const hasAuthParams = authCode || hasHashTokens;

            if (hasAuthParams) {
                // Show loading state while processing tokens
                loginForm.style.display = 'none';
                successMessage.innerHTML = `
                    <div style="text-align: center;">
                        <div class="loading-spinner" style="margin: 0 auto 16px;"></div>
                        <p>Confirming your email...</p>
                    </div>
                `;
                successMessage.classList.add('visible');
            }

            // If we have a PKCE code, exchange it for a session
            if (authCode) {
                try {
                    const { data, error } = await db.auth.exchangeCodeForSession(authCode);
                    if (error) {
                        console.error('Code exchange error:', error);
                        throw error;
                    }
                    // Clean the URL immediately after successful exchange
                    window.history.replaceState({}, '', window.location.pathname);
                } catch (err) {
                    console.error('Failed to exchange code for session:', err);
                    loginForm.style.display = 'block';
                    successMessage.classList.remove('visible');
                    errorMessage.textContent = 'Email confirmation failed. Please try signing in or request a new confirmation email.';
                    errorMessage.classList.add('visible');
                    window.history.replaceState({}, '', window.location.pathname);
                    return;
                }
            } else if (hasHashTokens) {
                // Legacy flow - wait for Supabase to process hash tokens
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // Check for authenticated user
            const user = await getCurrentUser();

            if (user) {
                // User is authenticated!
                if (hasAuthParams) {
                    // Coming from email confirmation — show onboarding transition if available
                    const hasOnboarding = typeof OnboardingStorage !== 'undefined' && OnboardingStorage.isComplete();

                    if (hasOnboarding && typeof OnboardingTransition !== 'undefined') {
                        // Hide the login card entirely and show the beautiful transition
                        document.querySelector('.auth-card').style.display = 'none';
                        successMessage.classList.remove('visible');

                        window.history.replaceState({}, '', window.location.pathname);

                        await OnboardingTransition.show({
                            onBuild: async () => {
                                await saveOnboardingDataAfterLogin(user.id);
                            },
                            redirectUrl: '/app/intelligence.html'
                        });
                    } else {
                        // No onboarding data — simple confirmation message
                        successMessage.innerHTML = `
                            <div style="text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 16px;">✓</div>
                                <h3 style="color: var(--color-accent); margin-bottom: 8px;">Email confirmed!</h3>
                                <p>Setting up your account...</p>
                            </div>
                        `;

                        await saveOnboardingDataAfterLogin(user.id);
                        celebrate();

                        successMessage.innerHTML = `
                            <div style="text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
                                <h3 style="color: var(--color-accent); margin-bottom: 8px;">Welcome to Royalty!</h3>
                                <p>Taking you to your workspace...</p>
                            </div>
                        `;

                        window.history.replaceState({}, '', window.location.pathname);

                        setTimeout(() => {
                            window.location.href = '/app/intelligence.html';
                        }, 1000);
                    }
                } else {
                    // Already logged in (not from email confirmation)
                    window.location.href = '/app/intelligence.html';
                }
            } else if (hasAuthParams) {
                // Had auth params but no user - something went wrong
                loginForm.style.display = 'block';
                successMessage.classList.remove('visible');
                errorMessage.textContent = 'Email confirmation failed. Please try signing in or request a new confirmation email.';
                errorMessage.classList.add('visible');
                window.history.replaceState({}, '', window.location.pathname);
            }
            // If no user and no auth params, just show the login form (already visible)
        }

        handleAuthOnLoad().catch(err => {
            console.error('Auth check error:', err);
        });

        // Template names for creating automations
        const templateNames = {
            'birthday-rewards': 'Birthday Rewards',
            'loyalty-program': 'Loyalty Points Program',
            'happy-hour': 'Happy Hour Alerts',
            'appointment-reminders': 'Appointment Reminders',
            'post-visit': 'Post-Visit Follow-up',
            'win-back': 'Win-Back Campaign',
            'referral-program': 'Referral Program',
            'review-request': 'Review Request',
            'new-product': 'New Product Announcements',
            'welcome-series': 'Welcome Series',
            'seasonal-promo': 'Seasonal Promotions',
            'vip-program': 'VIP Program'
        };

        // Save onboarding data to database after login (if any exists)
        async function saveOnboardingDataAfterLogin(userId) {
            if (typeof OnboardingStorage === 'undefined') return null;

            const onboardingData = OnboardingStorage.get();
            if (!onboardingData || (!onboardingData.selectedTemplates?.length && !onboardingData.customAutomation?.trim())) {
                return null;
            }

            try {
                // Get user's organization
                const { data: membership, error: membershipError } = await db
                    .from('organization_members')
                    .select('organization_id')
                    .eq('user_id', userId)
                    .single();

                if (membershipError || !membership) {
                    console.error('Error finding organization:', membershipError);
                    OnboardingStorage.clear();
                    return null;
                }

                const organizationId = membership.organization_id;

                // Check if user already has projects (don't create duplicate)
                const { data: existingProjects } = await db
                    .from('projects')
                    .select('id')
                    .eq('organization_id', organizationId)
                    .limit(1);

                if (existingProjects?.length > 0) {
                    // User already has projects, clear onboarding data
                    OnboardingStorage.clear();
                    return null;
                }

                // Create a default project with onboarding data
                const projectName = onboardingData.businessContext?.industry
                    ? `My ${onboardingData.businessContext.industry} Project`
                    : 'My First Project';

                const { data: project, error: projectError } = await db
                    .from('projects')
                    .insert({
                        organization_id: organizationId,
                        created_by: userId,
                        name: projectName,
                        description: onboardingData.businessPrompt || '',
                        industry: onboardingData.businessContext?.industry || null,
                        goals: onboardingData.businessContext?.goals || [],
                        pain_points: onboardingData.businessContext?.painPoints || [],
                        target_market: onboardingData.businessContext?.targetMarket || null,
                        location: onboardingData.businessContext?.location || null
                    })
                    .select()
                    .single();

                if (projectError) {
                    console.error('Error creating project:', projectError);
                    OnboardingStorage.clear();
                    return null;
                }

                // Create automations from selected templates
                if (onboardingData.selectedTemplates?.length > 0) {
                    const automations = onboardingData.selectedTemplates.map(templateId => ({
                        project_id: project.id,
                        name: templateNames[templateId] || templateId,
                        description: `Template: ${templateId}`,
                        type: 'email',
                        frequency: 'manual',
                        is_active: false,
                        settings: { template_id: templateId }
                    }));

                    const { error: automationError } = await db
                        .from('automations')
                        .insert(automations);

                    if (automationError) {
                        console.error('Error creating automations:', automationError);
                    }
                }

                // Create custom automation if provided
                if (onboardingData.customAutomation?.trim()) {
                    const { error: customError } = await db
                        .from('automations')
                        .insert({
                            project_id: project.id,
                            name: 'Custom Request: ' + (onboardingData.customAutomation.trim().slice(0, 60) || 'Pending'),
                            description: onboardingData.customAutomation,
                            type: 'custom',
                            frequency: 'manual',
                            is_active: false,
                            settings: { status: 'requested', source: 'onboarding' }
                        });

                    if (customError) {
                        console.error('Error creating custom automation:', customError);
                    }
                }

                // Clear onboarding data after successful save
                OnboardingStorage.clear();

                console.log('Onboarding data saved to project:', project.id);
                return project.id;
            } catch (err) {
                console.error('Error saving onboarding data:', err);
                return null;
            }
        }
    </script>
</body>
</html>
