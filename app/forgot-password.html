<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../i18n/i18n.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg-secondary) !important;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            margin: 0 auto;
            position: relative;
        }

        .auth-card {
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-border);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .logo {
            display: inline-flex;
            margin-bottom: 24px;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 15px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-field input {
            padding: 12px 16px;
            font-family: inherit;
            font-size: 15px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            outline: none;
            transition: all var(--transition-base);
        }

        .form-field input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-field input::placeholder {
            color: var(--color-text-muted);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-accent);
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 15px;
            text-align: center;
            display: none;
        }

        .success-message.visible {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .success-message h3 {
            font-size: 18px;
            margin-bottom: 4px;
            color: var(--color-accent);
        }

        .success-message p {
            margin: 0;
            opacity: 0.9;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .back-link:hover {
            color: var(--color-text);
        }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .lang-selector.compact {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="lang-selector compact">
            <button class="lang-selector-btn" type="button" aria-label="Change language">
                <span class="lang-selector-current">EN</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="lang-dropdown">
                <a href="#" class="lang-option active" data-lang="en">EN</a>
                <a href="#" class="lang-option" data-lang="es">ES</a>
                <a href="#" class="lang-option" data-lang="fr">FR</a>
                <a href="#" class="lang-option" data-lang="de">DE</a>
                <a href="#" class="lang-option" data-lang="it">IT</a>
                <a href="#" class="lang-option" data-lang="pt">PT</a>
                <a href="#" class="lang-option" data-lang="zh">ZH</a>
                <a href="#" class="lang-option" data-lang="ar">AR</a>
            </div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo">
                    <img src="/logo.svg" alt="Royalty" class="logo-icon">
                    <span class="logo-text">Royalty</span>
                </a>
                <h1 data-i18n="auth.forgotPasswordTitle">Reset your password</h1>
                <p data-i18n="auth.forgotPasswordSubtitle">Enter your email and we'll send you a reset link</p>
            </div>

            <div class="success-message" id="success-message">
                <div style="font-size: 48px; margin-bottom: 16px;">📧</div>
                <h3 data-i18n="auth.resetLinkSent">Check your inbox</h3>
                <p id="success-detail" data-i18n="auth.resetLinkSentDesc">We sent a password reset link to your email</p>
                <p style="font-size: 12px; color: var(--color-text-muted); margin-top: 16px;">
                    Didn't receive the email? Check your spam folder.
                </p>
            </div>

            <form class="auth-form" id="forgot-form">
                <div class="error-message" id="error-message"></div>

                <div class="form-field">
                    <label for="email" data-i18n="auth.email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" data-i18n-placeholder="auth.emailPlaceholder" required>
                </div>

                <div class="cf-turnstile" data-sitekey="0x4AAAAAACWKZKBFwf0yeBCo" data-callback="onTurnstileSuccess" data-theme="light"></div>
                <div class="captcha-error" id="captcha-error" style="display: none; color: var(--color-error); font-size: 13px; margin-bottom: 12px;" data-i18n="auth.captchaError">Please complete the CAPTCHA verification.</div>

                <button type="submit" class="btn btn-primary btn-block" id="submit-btn" data-i18n="auth.sendResetLink">
                    Send Reset Link
                </button>
            </form>
        </div>

        <a href="/app/login.html" class="back-link" data-i18n="auth.backToLogin">Back to login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../i18n/i18n.js?v=1"></script>
    <script src="auth.js?v=5"></script>
    <script>
        let turnstileToken = null;
        function onTurnstileSuccess(token) {
            turnstileToken = token;
            document.getElementById('captcha-error').style.display = 'none';
        }

        const forgotForm = document.getElementById('forgot-form');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();

            errorMessage.classList.remove('visible');
            errorMessage.textContent = '';

            // Validate CAPTCHA
            const captchaWidget = document.querySelector('.cf-turnstile');
            const siteKey = captchaWidget?.getAttribute('data-sitekey');
            if (siteKey && siteKey !== 'YOUR_SITE_KEY' && !turnstileToken) {
                document.getElementById('captcha-error').style.display = 'block';
                return;
            }

            // Rate limiting
            try {
                const { data: allowed, error: rlError } = await db.rpc('check_and_record_rate_limit', {
                    p_identifier: email.toLowerCase(),
                    p_action_type: 'password_reset',
                    p_max_attempts: 5,
                    p_window_minutes: 15
                });

                if (!rlError && allowed === false) {
                    errorMessage.textContent = 'Too many reset attempts. Please wait 15 minutes and try again.';
                    errorMessage.classList.add('visible');
                    return;
                }
            } catch (e) {
                console.warn('Rate limit check failed, continuing:', e);
            }

            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;

            try {
                const { error } = await db.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/app/reset-password.html'
                });

                if (error) throw error;

                // Always show success (don't reveal if email exists)
                forgotForm.style.display = 'none';
                successMessage.classList.add('visible');

            } catch (error) {
                console.error('Reset error:', error);

                // Still show success to avoid email enumeration
                forgotForm.style.display = 'none';
                successMessage.classList.add('visible');
            }
        });
    </script>
</body>
</html>
