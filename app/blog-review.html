<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Review - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="sidebar.css?v=4">
    <link rel="stylesheet" href="../i18n/i18n.css">
    <style>
        .br-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 48px;
        }

        .br-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-top: 32px;
        }

        .br-header-left h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            margin: 0 0 4px;
        }

        .br-header-left p {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            margin: 0;
        }

        /* ── Article List ─────────────────────────────────── */
        .br-table {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .br-table-row {
            display: grid;
            grid-template-columns: 1fr 140px 80px 100px;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--color-border);
            gap: 16px;
        }

        .br-table-row:last-child {
            border-bottom: none;
        }

        .br-table-head {
            background: var(--color-bg);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
        }

        .br-table-row > *:first-child {
            min-width: 0;
        }

        .br-article-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .br-article-slug {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-top: 2px;
        }

        .br-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .br-tag-draft {
            background: var(--color-warning-bg, #fef3c7);
            color: var(--color-warning, #d97706);
        }

        .br-tag-published {
            background: var(--color-success-bg, #d1fae5);
            color: var(--color-success, #059669);
        }

        .br-score {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .br-score-low { color: #ef4444; }
        .br-score-mid { color: #f59e0b; }
        .br-score-high { color: #10b981; }

        .br-empty {
            padding: 48px 24px;
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        /* ── Editor View ──────────────────────────────────── */
        #br-editor-view {
            display: none;
        }

        .br-editor-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 32px;
            margin-bottom: 24px;
        }

        .br-back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface);
            color: var(--color-text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .br-back-btn:hover { background: var(--color-bg); }

        .br-editor-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .br-editor-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .br-progress {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .br-progress-count {
            font-weight: 700;
            color: var(--color-text);
        }

        /* Editor content area */
        .br-editor-body {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 32px 40px;
            line-height: 1.7;
            color: var(--color-text);
        }

        .br-editor-body h1, .br-editor-body h2, .br-editor-body h3 {
            color: var(--color-text);
            margin: 1.5em 0 0.5em;
        }

        .br-editor-body h1 { font-size: 1.75rem; }
        .br-editor-body h2 { font-size: 1.25rem; }
        .br-editor-body h3 { font-size: 1.05rem; }

        .br-editor-body p { margin: 0 0 1em; }

        .br-editor-body ul, .br-editor-body ol {
            margin: 0 0 1em 1.5em;
        }

        .br-editor-body li { margin-bottom: 4px; }

        .br-editor-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 0.875rem;
        }

        .br-editor-body th {
            background: var(--color-bg);
            padding: 8px 12px;
            border: 1px solid var(--color-border);
            text-align: left;
            font-weight: 600;
        }

        .br-editor-body td {
            padding: 8px 12px;
            border: 1px solid var(--color-border);
        }

        .br-editor-body a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .br-editor-body strong { font-weight: 600; }

        /* HUMAN_EDIT suggestion card */
        .br-edit-card {
            border: 2px solid var(--color-warning, #f59e0b);
            border-radius: var(--radius-lg);
            background: var(--color-warning-bg, #fffbeb);
            margin: 16px 0;
            overflow: hidden;
        }

        .br-edit-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--color-warning, #f59e0b);
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .br-edit-card-type {
            background: rgba(255,255,255,0.25);
            padding: 1px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
        }

        .br-edit-card-score {
            margin-left: auto;
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .br-edit-card-score-low { color: #fecaca; }
        .br-edit-card-score-mid { color: #fef3c7; }
        .br-edit-card-score-ok  { color: #d1fae5; }

        .br-edit-card-body {
            padding: 14px 16px;
        }

        .br-edit-prompt {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-style: italic;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .br-suggestion-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .br-suggestion-text {
            font-size: 0.9rem;
            color: var(--color-text);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .br-suggestion-text.loading {
            color: var(--color-text-muted);
            font-style: italic;
        }

        .br-custom-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            font-family: inherit;
            font-size: 0.875rem;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 12px;
            display: none;
        }

        .br-custom-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .br-card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .br-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: opacity 0.15s, background 0.15s;
        }

        .br-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .br-btn-accept {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .br-btn-accept:hover:not(:disabled) { opacity: 0.85; }

        .br-btn-regenerate {
            background: var(--color-surface);
            color: var(--color-text);
            border-color: var(--color-border);
        }

        .br-btn-regenerate:hover:not(:disabled) { background: var(--color-bg); }

        .br-btn-custom {
            background: var(--color-surface);
            color: var(--color-text);
            border-color: var(--color-border);
        }

        .br-btn-custom:hover:not(:disabled) { background: var(--color-bg); }

        .br-btn-skip {
            background: transparent;
            color: var(--color-text-muted);
            border-color: transparent;
        }

        .br-btn-skip:hover:not(:disabled) { color: var(--color-text); }

        /* Accepted card state */
        .br-edit-card.accepted {
            border-color: var(--color-success, #10b981);
            background: var(--color-success-bg, #d1fae5);
        }

        .br-edit-card.accepted .br-edit-card-header {
            background: var(--color-success, #10b981);
        }

        /* Skipped card state */
        .br-edit-card.skipped {
            border-color: var(--color-border);
            background: var(--color-surface);
            opacity: 0.6;
        }

        .br-edit-card.skipped .br-edit-card-header {
            background: var(--color-text-muted);
        }

        /* ── Image Upload Panel ──────────────────────────────── */
        .br-image-panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .br-image-panel-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            padding-top: 4px;
        }

        .br-image-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .br-image-drop-zone {
            width: 100%;
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            min-height: 72px;
            background: var(--color-bg);
        }

        .br-image-drop-zone:hover,
        .br-image-drop-zone.drag-over {
            border-color: var(--color-primary);
            background: rgba(124, 58, 237, 0.04);
        }

        .br-image-drop-zone.has-image {
            border-style: solid;
            border-color: var(--color-success, #10b981);
        }

        .br-image-preview-thumb {
            width: 80px;
            height: 56px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            display: none;
        }

        .br-image-drop-placeholder {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .br-image-drop-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text);
        }

        .br-image-drop-hint {
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        .br-image-clear-btn {
            margin-left: auto;
            flex-shrink: 0;
            padding: 4px 10px;
            font-size: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-surface);
            color: var(--color-text-muted);
            cursor: pointer;
            display: none;
        }

        .br-image-clear-btn:hover { color: var(--color-text); }

        .br-image-uploading {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-style: italic;
        }

        .br-image-url-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .br-image-url-or {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .br-image-url-input {
            flex: 1;
            padding: 7px 10px;
            font-size: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            font-family: inherit;
        }

        .br-image-url-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        /* Bottom save bar */
        .br-save-bar {
            position: sticky;
            bottom: 0;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 -40px;
            z-index: 10;
        }

        .br-save-status {
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .br-save-status.saved {
            color: var(--color-success, #10b981);
        }

        /* Toast */
        .br-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--color-text);
            color: var(--color-bg);
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            z-index: 9999;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        .br-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .br-back-to-blog {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            text-decoration: none;
            margin-bottom: 6px;
        }
        .br-back-to-blog:hover { color: var(--color-text); }

        .br-bulk-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .br-table-row { grid-template-columns: 1fr 80px; }
            .br-table-row > *:nth-child(3),
            .br-table-row > *:nth-child(4) { display: none; }
            .br-editor-body { padding: 20px; }
            .br-save-bar { margin: 0 -20px; padding: 14px 20px; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <main class="app-main">
        <div class="br-container">

            <!-- List View -->
            <div id="br-list-view">
                <div class="br-header">
                    <div class="br-header-left">
                        <a href="/blog/" class="br-back-to-blog">← Blog</a>
                        <h1 data-i18n="blogReview.title">Blog Review</h1>
                        <p id="br-subtitle">Loading articles...</p>
                    </div>
                </div>

                <div id="br-list-content">
                    <div class="br-empty">Loading...</div>
                </div>
            </div>

            <!-- Editor View -->
            <div id="br-editor-view">
                <div class="br-editor-header">
                    <button class="br-back-btn" id="br-back-btn">
                        ← Back
                    </button>
                    <div class="br-editor-title" id="br-editor-title"></div>
                    <div class="br-editor-actions">
                        <span class="br-progress" id="br-progress-text"></span>
                        <div class="br-bulk-actions">
                            <button class="br-btn br-btn-skip" id="br-skip-all-btn">Skip All</button>
                            <button class="br-btn br-btn-skip" id="br-reject-all-btn">✕ Reject All</button>
                            <button class="br-btn br-btn-regenerate" id="br-requery-all-btn">↺ Re-query All</button>
                            <button class="br-btn br-btn-accept" id="br-accept-all-btn">✓ Accept All</button>
                        </div>
                    </div>
                </div>

                <!-- Featured Image Upload -->
                <div class="br-image-panel">
                    <span class="br-image-panel-label">Featured<br>Image</span>
                    <div class="br-image-right">
                        <div class="br-image-drop-zone" id="br-image-drop-zone">
                            <img class="br-image-preview-thumb" id="br-image-preview-thumb" alt="Preview">
                            <div class="br-image-drop-placeholder" id="br-image-drop-placeholder">
                                <span class="br-image-drop-title">Click or drag to upload</span>
                                <span class="br-image-drop-hint">JPEG, PNG or WebP — max 5MB</span>
                            </div>
                            <span class="br-image-uploading" id="br-image-uploading" style="display:none;">Uploading...</span>
                            <button class="br-image-clear-btn" id="br-image-clear-btn" type="button">✕ Remove</button>
                            <input type="file" id="br-image-input" accept="image/jpeg,image/png,image/webp" hidden>
                        </div>
                        <div class="br-image-url-row">
                            <span class="br-image-url-or">or paste a URL</span>
                            <input type="url" id="br-image-url-input" class="br-image-url-input" placeholder="Right-click Unsplash photo → Copy Image Address">
                            <button type="button" id="br-image-url-btn" class="br-btn br-btn-accept">Use</button>
                        </div>
                    </div>
                </div>

                <div class="br-editor-body" id="br-editor-body"></div>

                <div class="br-save-bar">
                    <span class="br-save-status" id="br-save-status"></span>
                    <div style="display:flex;gap:10px">
                        <button class="btn btn-secondary" id="br-save-btn">Save Draft</button>
                        <button class="btn btn-primary" id="br-publish-btn" disabled>Publish</button>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- Toast notification -->
<div class="br-toast" id="br-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../i18n/i18n.js?v=1"></script>
<script src="auth.js?v=5"></script>
<script src="utils.js?v=5"></script>
<script src="sidebar.js?v=17"></script>
<script src="blog-review.js?v=15"></script>
</body>
</html>
