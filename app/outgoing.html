<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Manager - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="sidebar.css?v=4">
    <link rel="stylesheet" href="outgoing.css?v=5">
    <link rel="stylesheet" href="../i18n/i18n.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar injected by sidebar.js -->

        <main class="app-main">
            <div class="page-header">
                <div class="container">
                    <div>
                        <h1 class="page-title" data-i18n="outgoing.title">Campaign Manager</h1>
                        <p class="page-subtitle" data-i18n="outgoing.subtitle">Monitor and manage campaigns created by Royal AI</p>
                    </div>
                    <a href="/app/automations.html" class="btn btn-secondary" style="text-decoration:none;" data-i18n="outgoing.viewAutomations">View Automations</a>
                </div>
            </div>

            <div class="outgoing-page">
                <!-- Summary Cards -->
                <div class="summary-cards" id="summary-cards">
                    <div class="summary-card">
                        <div class="summary-card-label" data-i18n="outgoing.totalSent">Total Sent</div>
                        <div class="summary-card-value">&mdash;</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-label" data-i18n="outgoing.delivered">Delivered</div>
                        <div class="summary-card-value">&mdash;</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-label" data-i18n="outgoing.opened">Opened</div>
                        <div class="summary-card-value">&mdash;</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-card-label" data-i18n="outgoing.clicked">Clicked</div>
                        <div class="summary-card-value">&mdash;</div>
                    </div>
                </div>

                <!-- Search -->
                <div class="search-bar">
                    <svg class="search-bar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" class="search-input" id="filter-search" placeholder="Search campaigns..." data-i18n-placeholder="outgoing.searchPlaceholder">
                </div>

                <!-- Filters -->
                <div class="filters-bar">
                    <select class="filter-select" id="filter-channel">
                        <option value="" data-i18n="outgoing.allChannels">All Channels</option>
                        <option value="email">Email</option>
                        <option value="sms">SMS</option>
                        <option value="push">Push</option>
                        <option value="in_app">In-App</option>
                    </select>
                    <select class="filter-select" id="filter-status">
                        <option value="" data-i18n="outgoing.allStatuses">All Statuses</option>
                        <option value="upcoming" selected data-i18n="outgoing.statusUpcoming">Upcoming</option>
                        <option value="sent" data-i18n="outgoing.statusSent">Sent</option>
                        <option value="sending" data-i18n="outgoing.statusSending">Sending</option>
                        <option value="scheduled" data-i18n="outgoing.statusScheduled">Scheduled</option>
                        <option value="draft" data-i18n="outgoing.statusDraft">Draft</option>
                        <option value="failed" data-i18n="outgoing.statusFailed">Failed</option>
                        <option value="paused" data-i18n="outgoing.statusPaused">Paused</option>
                        <option value="cancelled" data-i18n="outgoing.statusCancelled">Cancelled</option>
                    </select>
                    <select class="filter-select" id="filter-days">
                        <option value="7">Last 7 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                    </select>
                    <select class="filter-select" id="filter-sort">
                        <option value="date" data-i18n="outgoing.sortDate">Sort: Date</option>
                        <option value="recipients" data-i18n="outgoing.sortRecipients">Sort: Recipients</option>
                        <option value="open_rate" data-i18n="outgoing.sortOpenRate">Sort: Open Rate</option>
                    </select>
                    <div class="filters-spacer"></div>
                    <div class="bulk-actions">
                        <button class="btn-sm" onclick="OutgoingManager.pauseAllAutomations()" data-i18n="outgoing.pauseAll">Pause All</button>
                        <button class="btn-sm" onclick="OutgoingManager.resumeAllAutomations()" data-i18n="outgoing.resumeAll">Resume All</button>
                    </div>
                </div>

                <!-- Campaign List -->
                <div id="outgoing-content">
                    <div class="loading-spinner"><div class="spinner"></div><span>Loading campaigns...</span></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div class="modal-backdrop" id="detail-modal" onclick="if(event.target===this) OutgoingManager.closeDetail()">
        <div class="modal-content" id="detail-modal-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../i18n/i18n.js?v=1"></script>
    <script src="auth.js?v=9"></script>
    <script src="sidebar.js?v=20"></script>
    <script src="celebrate.js"></script>
    <script src="undo-toast.js"></script>
    <script src="outgoing.js?v=6"></script>
    <script>
        let currentUser = null;
        let currentOrganization = null;
        let currentUserRole = null;

        async function initOutgoing() {
            currentUser = await requireAuth();
            if (!currentUser) return;

            const userProfile = await loadUserInfo();

            if (typeof AppSidebar !== 'undefined') {
                AppSidebar.init({
                    name: userProfile?.fullName || currentUser.email.split('@')[0],
                    email: currentUser.email,
                    organization: currentOrganization,
                    role: currentUserRole,
                    isAdmin: userProfile?.profile?.is_admin === true
                });
            }

            if (currentOrganization?.id) {
                OutgoingManager.init(currentOrganization.id);
            }
        }

        async function loadUserInfo() {
            const profile = await getUserProfile(currentUser.id);

            try {
                const { data: membership } = await db
                    .from('organization_members')
                    .select('role, organizations(id, name)')
                    .eq('user_id', currentUser.id)
                    .limit(1)
                    .single();

                if (membership) {
                    currentUserRole = membership.role;
                    currentOrganization = membership.organizations;
                }
            } catch (e) {
                console.error('Error loading organization:', e);
            }

            let fullName = '';
            if (profile && (profile.first_name || profile.last_name)) {
                fullName = [profile.first_name, profile.last_name].filter(Boolean).join(' ');
            } else {
                fullName = currentUser.email.split('@')[0];
            }

            return { profile, fullName };
        }

        document.addEventListener('DOMContentLoaded', initOutgoing);

        // Close modal on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') OutgoingManager.closeDetail();
        });
    </script>
</body>
</html>
