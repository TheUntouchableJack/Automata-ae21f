<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg-secondary) !important;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            margin: 0 auto;
        }

        .auth-card {
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-border);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .logo {
            display: inline-flex;
            margin-bottom: 24px;
        }

        .auth-header .shield-icon {
            width: 48px;
            height: 48px;
            background: rgba(124, 58, 237, 0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .auth-header h1 {
            font-size: 1.375rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--color-text);
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            background: rgba(124, 58, 237, 0.1);
            color: var(--color-primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .otp-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .otp-field label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .otp-input {
            padding: 14px 16px;
            font-family: 'Space Grotesk', monospace;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-align: center;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            outline: none;
            transition: all var(--transition-base);
            width: 100%;
            box-sizing: border-box;
        }

        .otp-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .otp-input::placeholder {
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
        }

        .trust-device {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px;
            background: var(--color-bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            margin-bottom: 24px;
            cursor: pointer;
        }

        .trust-device input[type="checkbox"] {
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: var(--color-primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .trust-device-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .trust-device-text span {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .trust-device-text small {
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .btn-verify {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-verify:hover:not(:disabled) {
            background: var(--color-primary-dark, #6d28d9);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.visible { display: block; }

        .resend-row {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .resend-link {
            color: var(--color-primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .resend-link:hover { text-decoration: underline; }
        .resend-link.disabled {
            color: var(--color-text-muted);
            cursor: not-allowed;
            pointer-events: none;
        }

        .method-switcher {
            margin-top: 24px;
            text-align: center;
        }

        .method-switcher-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .method-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            cursor: pointer;
            font-size: 14px;
            color: var(--color-text);
            font-family: inherit;
            transition: all var(--transition-base);
            width: 100%;
        }

        .method-btn:hover {
            border-color: var(--color-primary);
            background: rgba(124, 58, 237, 0.04);
        }

        .method-btn svg { color: var(--color-text-muted); flex-shrink: 0; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--color-text-muted);
            font-size: 12px;
            margin: 20px 0 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--color-text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--color-primary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/index.html" class="logo">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="10" fill="#7c3aed"/>
                        <path d="M18 8l3.5 7h7.5l-6 4.5 2.5 7.5L18 23l-7.5 4L13 19 7 14.5h7.5L18 8z" fill="white"/>
                    </svg>
                </a>

                <div class="shield-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>

                <h1>Two-Factor Verification</h1>
                <p id="method-description">Enter the 6-digit code sent to your email.</p>
            </div>

            <div id="error-msg" class="error-message"></div>

            <div class="otp-field">
                <label for="otp-input">Verification Code</label>
                <input
                    type="text"
                    id="otp-input"
                    class="otp-input"
                    placeholder="000000"
                    maxlength="6"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    autofocus
                />
            </div>

            <label class="trust-device">
                <input type="checkbox" id="trust-device-cb">
                <div class="trust-device-text">
                    <span>Trust this device for 30 days</span>
                    <small>You won't be asked for a code on this device until it expires.</small>
                </div>
            </label>

            <button class="btn-verify" id="verify-btn" onclick="handleVerify()">
                Verify Identity
            </button>

            <!-- Resend row (email OTP only) -->
            <div class="resend-row" id="resend-row" style="display: none;">
                Didn't receive the code?
                <a class="resend-link" id="resend-link" onclick="handleResend()">Resend code</a>
                <span id="resend-timer" style="display: none;"></span>
            </div>

            <div id="method-switcher" style="display: none;">
                <div class="divider">or use another method</div>
                <div class="method-switcher-list" id="other-methods"></div>
            </div>

            <a href="#" class="back-link" onclick="event.preventDefault(); db.auth.signOut().then(() => { window.location.href = '/app/login.html'; });">Sign in with a different account</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="auth.js?v=9"></script>
    <script src="mfa.js?v=2"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────────
        let activeMethod   = sessionStorage.getItem('royalty_mfa_method') || 'email';
        let activeFactor   = null;   // TOTP factor (when using TOTP)
        let allFactors     = [];
        let resendCooldown = 0;
        let resendInterval = null;
        const returnUrl    = sessionStorage.getItem('royalty_mfa_return') || '/app/dashboard.html';

        // ── Init ───────────────────────────────────────────────────────────
        (async function init() {
            // Must have a live session (aal1) to be here
            const session = await getSession();
            if (!session) {
                window.location.href = '/app/login.html';
                return;
            }

            // Check if already at aal2 (TOTP already verified)
            const { data: aal } = await db.auth.mfa.getAuthenticatorAssuranceLevel();
            if (aal?.currentLevel === 'aal2' && activeMethod === 'totp') {
                sessionStorage.removeItem('royalty_mfa_return');
                sessionStorage.removeItem('royalty_mfa_method');
                window.location.href = returnUrl;
                return;
            }

            // Load TOTP factors
            const { totp } = await mfaListFactors();
            allFactors = totp;

            if (activeMethod === 'totp' && allFactors.length > 0) {
                activeFactor = allFactors.find(f => f.status === 'verified') || allFactors[0];
            }

            renderUI();
        })();

        function renderUI() {
            const desc = document.getElementById('method-description');
            const resendRow = document.getElementById('resend-row');
            const switcherContainer = document.getElementById('method-switcher');
            const switcherList = document.getElementById('other-methods');

            if (activeMethod === 'email') {
                desc.textContent = 'Enter the 6-digit code sent to your email.';
                resendRow.style.display = 'block';
                startResendCooldown(30); // 30s cooldown after initial send
            } else {
                desc.textContent = 'Enter the 6-digit code from your authenticator app.';
                resendRow.style.display = 'none';
            }

            // Build method switcher
            const hasTotpFactors = allFactors.some(f => f.status === 'verified');
            const user = null; // We'll check asynchronously
            const alternatives = [];

            if (activeMethod === 'email' && hasTotpFactors) {
                alternatives.push({
                    label: 'Use authenticator app',
                    icon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
                    method: 'totp',
                });
            } else if (activeMethod === 'totp') {
                alternatives.push({
                    label: 'Use email verification',
                    icon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
                    method: 'email',
                });
            }

            if (alternatives.length > 0) {
                switcherContainer.style.display = 'block';
                switcherList.innerHTML = alternatives.map(alt => `
                    <button class="method-btn" onclick="switchMethod('${alt.method}')">
                        ${alt.icon}
                        ${alt.label}
                    </button>
                `).join('');
            } else {
                switcherContainer.style.display = 'none';
            }

            // Focus input
            document.getElementById('otp-input').value = '';
            document.getElementById('otp-input').focus();
        }

        async function switchMethod(method) {
            activeMethod = method;
            sessionStorage.setItem('royalty_mfa_method', method);

            if (method === 'totp') {
                activeFactor = allFactors.find(f => f.status === 'verified') || allFactors[0];
            } else if (method === 'email') {
                // Send a new code
                const result = await mfaSendEmailCode();
                if (!result.ok) {
                    showError('Failed to send email code: ' + result.error);
                }
            }

            hideError();
            renderUI();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error-msg').classList.remove('visible');
        }

        async function handleVerify() {
            const code = document.getElementById('otp-input').value.trim();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showError('Please enter a valid 6-digit code.');
                return;
            }

            hideError();
            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying…';

            let success = false;
            let error = null;

            if (activeMethod === 'email') {
                const result = await mfaVerifyEmailCode(code);
                success = result.ok;
                error = result.error;
            } else if (activeMethod === 'totp' && activeFactor) {
                const result = await mfaChallengeAndVerify(activeFactor.id, code);
                success = result.success;
                error = result.error;
            } else {
                error = 'No MFA method configured.';
            }

            if (!success) {
                btn.disabled = false;
                btn.textContent = 'Verify Identity';
                showError(error || 'Invalid code. Please try again.');
                document.getElementById('otp-input').value = '';
                document.getElementById('otp-input').focus();
                return;
            }

            // Optionally trust device
            if (document.getElementById('trust-device-cb').checked) {
                const user = await getCurrentUser();
                if (user) await mfaTrustDevice(user.id);
            }

            sessionStorage.removeItem('royalty_mfa_return');
            sessionStorage.removeItem('royalty_mfa_method');
            window.location.href = returnUrl;
        }

        // ── Resend email code ──────────────────────────────────────────────
        async function handleResend() {
            if (resendCooldown > 0) return;

            const link = document.getElementById('resend-link');
            link.classList.add('disabled');
            link.textContent = 'Sending…';

            const result = await mfaSendEmailCode();

            if (result.ok) {
                link.textContent = 'Code sent!';
                startResendCooldown(60);
            } else {
                link.textContent = 'Resend code';
                link.classList.remove('disabled');
                showError(result.error || 'Failed to resend code.');
            }
        }

        function startResendCooldown(seconds) {
            resendCooldown = seconds;
            const link = document.getElementById('resend-link');
            const timer = document.getElementById('resend-timer');

            link.style.display = 'none';
            timer.style.display = 'inline';
            timer.textContent = `Resend in ${resendCooldown}s`;

            if (resendInterval) clearInterval(resendInterval);
            resendInterval = setInterval(() => {
                resendCooldown--;
                if (resendCooldown <= 0) {
                    clearInterval(resendInterval);
                    resendInterval = null;
                    link.style.display = 'inline';
                    link.textContent = 'Resend code';
                    link.classList.remove('disabled');
                    timer.style.display = 'none';
                } else {
                    timer.textContent = `Resend in ${resendCooldown}s`;
                }
            }, 1000);
        }

        // Auto-submit when 6 digits entered
        document.getElementById('otp-input').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            if (this.value.length === 6) handleVerify();
        });

        // Enter key
        document.getElementById('otp-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleVerify();
        });
    </script>
</body>
</html>
