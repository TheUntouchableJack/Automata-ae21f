<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity - Royalty</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--color-bg-secondary) !important;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            margin: 0 auto;
        }

        .auth-card {
            background: var(--color-bg);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-border);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .logo {
            display: inline-flex;
            margin-bottom: 24px;
        }

        .auth-header .shield-icon {
            width: 48px;
            height: 48px;
            background: rgba(124, 58, 237, 0.1);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .auth-header h1 {
            font-size: 1.375rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--color-text);
        }

        .auth-header p {
            color: var(--color-text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            background: rgba(124, 58, 237, 0.1);
            color: var(--color-primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .otp-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .otp-field label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .otp-input {
            padding: 14px 16px;
            font-family: 'Space Grotesk', monospace;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-align: center;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            color: var(--color-text);
            outline: none;
            transition: all var(--transition-base);
            width: 100%;
            box-sizing: border-box;
        }

        .otp-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .otp-input::placeholder {
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
        }

        .trust-device {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px;
            background: var(--color-bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            margin-bottom: 24px;
            cursor: pointer;
        }

        .trust-device input[type="checkbox"] {
            margin-top: 2px;
            flex-shrink: 0;
            accent-color: var(--color-primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .trust-device-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .trust-device-text span {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .trust-device-text small {
            font-size: 12px;
            color: var(--color-text-muted);
        }

        .btn-verify {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .btn-verify:hover:not(:disabled) {
            background: var(--color-primary-dark, #6d28d9);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-error);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .error-message.visible { display: block; }

        .method-switcher {
            margin-top: 24px;
            text-align: center;
        }

        .method-switcher-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .method-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-bg);
            cursor: pointer;
            font-size: 14px;
            color: var(--color-text);
            font-family: inherit;
            transition: all var(--transition-base);
            width: 100%;
        }

        .method-btn:hover {
            border-color: var(--color-primary);
            background: rgba(124, 58, 237, 0.04);
        }

        .method-btn svg { color: var(--color-text-muted); flex-shrink: 0; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--color-text-muted);
            font-size: 12px;
            margin: 20px 0 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--color-text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--color-primary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/index.html" class="logo">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="10" fill="#7c3aed"/>
                        <path d="M18 8l3.5 7h7.5l-6 4.5 2.5 7.5L18 23l-7.5 4L13 19 7 14.5h7.5L18 8z" fill="white"/>
                    </svg>
                </a>

                <div class="shield-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>

                <h1>Two-Factor Verification</h1>
                <p id="method-description">Enter the 6-digit code from your authenticator app.</p>
            </div>

            <div id="error-msg" class="error-message"></div>

            <div class="otp-field">
                <label for="otp-input">Verification Code</label>
                <input
                    type="text"
                    id="otp-input"
                    class="otp-input"
                    placeholder="000000"
                    maxlength="6"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    autofocus
                />
            </div>

            <label class="trust-device">
                <input type="checkbox" id="trust-device-cb">
                <div class="trust-device-text">
                    <span>Trust this device for 30 days</span>
                    <small>You won't be asked for a code on this device until it expires.</small>
                </div>
            </label>

            <button class="btn-verify" id="verify-btn" onclick="handleVerify()">
                Verify Identity
            </button>

            <div id="method-switcher" style="display: none;">
                <div class="divider">or use another method</div>
                <div class="method-switcher-list" id="other-methods"></div>
            </div>

            <a href="/app/login.html" class="back-link">Sign in with a different account</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="auth.js?v=8"></script>
    <script src="mfa.js?v=1"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────────
        let activeFactor   = null;
        let allFactors     = [];
        const returnUrl    = sessionStorage.getItem('royalty_mfa_return') || '/app/dashboard.html';

        // ── Init ───────────────────────────────────────────────────────────
        (async function init() {
            // Must have a live session (aal1) to be here
            const session = await getSession();
            if (!session) {
                window.location.href = '/app/login.html';
                return;
            }

            const { data: aal } = await db.auth.mfa.getAuthenticatorAssuranceLevel();
            if (aal?.currentLevel === 'aal2') {
                // Already verified — move on
                sessionStorage.removeItem('royalty_mfa_return');
                window.location.href = returnUrl;
                return;
            }

            const { totp } = await mfaListFactors();
            allFactors = totp;

            if (allFactors.length === 0) {
                // No factors — shouldn't be here
                window.location.href = returnUrl;
                return;
            }

            // Default to first verified factor
            activeFactor = allFactors.find(f => f.status === 'verified') || allFactors[0];
            renderActiveMethod();
            renderSwitcher();
        })();

        function renderActiveMethod() {
            if (!activeFactor) return;
            const desc = document.getElementById('method-description');
            desc.textContent = 'Enter the 6-digit code from your authenticator app.';
        }

        function renderSwitcher() {
            const others = allFactors.filter(f => f.id !== activeFactor?.id && f.status === 'verified');
            const container = document.getElementById('method-switcher');
            const list      = document.getElementById('other-methods');

            if (others.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            list.innerHTML = others.map(f => `
                <button class="method-btn" onclick="switchFactor('${f.id}')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                        <line x1="12" y1="18" x2="12.01" y2="18"/>
                    </svg>
                    Use authenticator: ${escapeHtml(f.friendly_name || 'Authenticator App')}
                </button>
            `).join('');
        }

        function switchFactor(factorId) {
            activeFactor = allFactors.find(f => f.id === factorId);
            renderActiveMethod();
            renderSwitcher();
            document.getElementById('otp-input').value = '';
            document.getElementById('otp-input').focus();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('error-msg').classList.remove('visible');
        }

        async function handleVerify() {
            const code = document.getElementById('otp-input').value.trim();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showError('Please enter a valid 6-digit code.');
                return;
            }

            hideError();
            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = 'Verifying…';

            const { success, error } = await mfaChallengeAndVerify(activeFactor.id, code);

            if (!success) {
                btn.disabled = false;
                btn.textContent = 'Verify Identity';
                showError(error || 'Invalid code. Please try again.');
                document.getElementById('otp-input').value = '';
                document.getElementById('otp-input').focus();
                return;
            }

            // Optionally trust device
            if (document.getElementById('trust-device-cb').checked) {
                const user = await getCurrentUser();
                if (user) await mfaTrustDevice(user.id);
            }

            sessionStorage.removeItem('royalty_mfa_return');
            window.location.href = returnUrl;
        }

        // Auto-submit when 6 digits entered
        document.getElementById('otp-input').addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            if (this.value.length === 6) handleVerify();
        });

        // Enter key
        document.getElementById('otp-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleVerify();
        });

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
